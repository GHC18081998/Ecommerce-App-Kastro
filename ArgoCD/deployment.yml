apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  labels:
    app: ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: ecommerce-app
        image: maheesh1/ecommerce-app:3
        imagePullPolicy: "Always"
        ports:
        - containerPort: 8080
